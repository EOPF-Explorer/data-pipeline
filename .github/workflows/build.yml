name: Build Docker Image

on:
  workflow_call:
    inputs:
      release_tag:
        description: Git tag to build (set by Release Please after a release is created)
        type: string
        required: true
    secrets:
      OVH_HARBOR_REGISTRY:
        required: true
      OVH_HARBOR_USERNAME:
        required: true
      OVH_HARBOR_PASSWORD:
        required: true
  push:
    branches:
      - main
    tags:
      - '*'
  release:
    types: [published]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build and publish image
    environment: harbor-registry
    runs-on: ubuntu-latest
    permissions:
      contents: read # Clone repo and supply Docker build context.
      actions: write # Persist Docker layer cache for docker/build-push-action (type=gha).

    steps:
    - name: Checkout code (release tag from Release Please)
      if: github.event_name == 'workflow_call'
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0
        ref: ${{ inputs.release_tag }}
        persist-credentials: false

    - name: Checkout code
      if: github.event_name != 'workflow_call'
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0  # Fetch all history and tags
        ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
        persist-credentials: false

    - name: Get tag name for Docker metadata
      id: tag_name
      env:
        EVENT_NAME: ${{ github.event_name }}
        RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        GITHUB_REF_VALUE: ${{ github.ref }}
        CALL_RELEASE_TAG: ${{ github.event_name == 'workflow_call' && inputs.release_tag || '' }}
      run: |
        if [ "$EVENT_NAME" = "workflow_call" ]; then
          echo "tag=$CALL_RELEASE_TAG" >> $GITHUB_OUTPUT
        elif [ "$EVENT_NAME" = "release" ]; then
          echo "tag=$RELEASE_TAG_NAME" >> $GITHUB_OUTPUT
        elif [[ "$GITHUB_REF_VALUE" == refs/tags/* ]]; then
          ref_no_prefix="${GITHUB_REF_VALUE#refs/tags/}"
          echo "tag=$ref_no_prefix" >> $GITHUB_OUTPUT
        fi

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
      with:
        images: ${{ secrets.OVH_HARBOR_REGISTRY }}/eopf-sentinel-zarr-explorer/data-pipeline
        tags: |
          type=sha
          type=ref,event=branch
          type=ref,event=pr
          type=ref,event=tag
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=raw,value=${{ steps.tag_name.outputs.tag }},enable=${{ steps.tag_name.outputs.tag != '' }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Log in to OVH Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ${{ secrets.OVH_HARBOR_REGISTRY }}
        username: ${{ secrets.OVH_HARBOR_USERNAME }}
        password: ${{ secrets.OVH_HARBOR_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
      with:
        context: .
        file: docker/Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image summary
      env:
        META_TAGS: ${{ steps.meta.outputs.tags }}
        META_LABELS: ${{ steps.meta.outputs.labels }}
      run: |
        echo "### Docker Image Built 🐳" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "$META_TAGS" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Labels:**" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "$META_LABELS" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
