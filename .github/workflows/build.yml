name: Build Docker Image

on:
  workflow_call:
    inputs:
      release_tag:
        description: Git tag to build (set by Release Please after a release is created)
        type: string
        required: true
    secrets:
      OVH_HARBOR_REGISTRY:
        required: true
      OVH_HARBOR_USERNAME:
        required: true
      OVH_HARBOR_PASSWORD:
        required: true
  push:
    branches:
      - '**'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build and publish image
    environment: harbor-registry
    runs-on: ubuntu-latest
    permissions:
      contents: read # Clone repo and supply Docker build context.
      actions: write # Persist Docker layer cache for docker/build-push-action (type=gha).
      security-events: write # Upload Trivy SARIF to GitHub Advanced Security / Security tab.

    env:
      PUSH_IMAGE: ${{ github.repository == 'EOPF-Explorer/data-pipeline' && github.actor != 'dependabot[bot]' && (github.event_name == 'workflow_call' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) }}

    steps:
    - name: Checkout code (release tag from Release Please)
      if: inputs.release_tag != ''
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        ref: ${{ inputs.release_tag }}
        persist-credentials: false

    - name: Checkout code
      if: inputs.release_tag == ''
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0  # Fetch all history and tags
        ref: ${{ github.ref }}
        persist-credentials: false

    - name: Get tag name for Docker metadata
      id: tag_name
      env:
        GITHUB_REF_VALUE: ${{ github.ref }}
        CALL_RELEASE_TAG: ${{ inputs.release_tag }}
      run: |
        if [ -n "$CALL_RELEASE_TAG" ]; then
          echo "tag=$CALL_RELEASE_TAG" >> $GITHUB_OUTPUT
        elif [[ "$GITHUB_REF_VALUE" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF_VALUE#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ secrets.OVH_HARBOR_REGISTRY || 'localhost' }}/eopf-sentinel-zarr-explorer/data-pipeline
        tags: |
          type=sha
          type=ref,event=branch
          type=ref,event=pr
          type=ref,event=tag
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=raw,value=${{ steps.tag_name.outputs.tag }},enable=${{ steps.tag_name.outputs.tag != '' }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Log in to OVH Container Registry
      if: env.PUSH_IMAGE == 'true'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ secrets.OVH_HARBOR_REGISTRY }}
        username: ${{ secrets.OVH_HARBOR_USERNAME }}
        password: ${{ secrets.OVH_HARBOR_PASSWORD }}

    - name: Build Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        file: docker/Dockerfile
        platforms: linux/amd64
        push: false
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Scan image with Trivy (SARIF CRITICAL/HIGH, incl. unfixed)
      id: trivy-sarif-critical-high
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}  # tags[0] is always the sha-* tag emitted first by docker/metadata-action
        format: sarif
        output: trivy-results-critical-high.sarif
        exit-code: '0'
        vuln-type: os,library
        severity: CRITICAL,HIGH

    - name: Fail on fixable CRITICAL vulnerabilities
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}  # tags[0] is always the sha-* tag emitted first by docker/metadata-action
        format: table
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: os,library
        severity: CRITICAL

    - name: Warn on fixable HIGH vulnerabilities
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}  # tags[0] is always the sha-* tag emitted first by docker/metadata-action
        format: table
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: os,library
        severity: HIGH

    - name: Scan image with Trivy (SARIF MEDIUM/LOW, fixed only)
      id: trivy-sarif-medium-low
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        format: sarif
        output: trivy-results-medium-low.sarif
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: os,library
        severity: MEDIUM,LOW


    - name: Push Docker image
      if: env.PUSH_IMAGE == 'true'
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        file: docker/Dockerfile
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha

    - name: Upload Trivy SARIF (CRITICAL/HIGH) to GitHub Security tab
      if: steps.trivy-sarif-critical-high.outcome == 'success' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: trivy-results-critical-high.sarif
        category: trivy-critical-high

    - name: Image summary
      env:
        META_TAGS: ${{ steps.meta.outputs.tags }}
        META_LABELS: ${{ steps.meta.outputs.labels }}
      run: |
        echo "### Docker Image Built 🐳" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "$META_TAGS" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Labels:**" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "$META_LABELS" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
