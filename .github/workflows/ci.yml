name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.13'
    - name: Install uv
      uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      with:
        version: "latest"
    - name: Install dependencies
      run: uv sync --all-groups
    - name: Set up pre-commit cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-3.13-${{ hashFiles('.pre-commit-config.yaml') }}
    - name: Run pre-commit
      run: uv run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.13'
    - name: Install uv
      uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      with:
        version: "latest"
    - name: Install dependencies
      run: uv sync --all-groups
    - name: Run tests
      run: uv run pytest tests/ -v --tb=short

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.13'
    - name: Install uv
      uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      with:
        enable-cache: false
    - name: Install project dependencies
      run: uv sync --no-dev
    - name: Install security tools
      run: pip install bandit pip-audit
    - name: Run bandit (static security analysis)
      run: bandit -r scripts/ -f json -o bandit-report.json
      continue-on-error: true
    - name: Run pip-audit (dependency vulnerability scan)
      run: .venv/bin/pip freeze | grep -v " @ " | pip-audit -r /dev/stdin -f json -o pip-audit-report.json
      continue-on-error: true
    - name: Write security summary
      if: always()
      env:
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: python .github/scripts/security_summary.py
    - name: Post PR comment
      if: always() && github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR: ${{ github.event.pull_request.number }}
      run: |
        MARKER="<!-- security-scan-results -->"
        BODY=$(cat security-summary.md)

        COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR}/comments" \
          --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
          | head -1)

        if [ -n "$COMMENT_ID" ]; then
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
            -X PATCH -f body="${BODY}"
        else
          gh api "repos/${REPO}/issues/${PR}/comments" \
            -X POST -f body="${BODY}"
        fi
    - name: Fail if security issues found
      if: always()
      run: python .github/scripts/security_check.py
    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: security-reports
        path: |
          bandit-report.json
          pip-audit-report.json
